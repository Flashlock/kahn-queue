# Publish the Python package to PyPI on tags: `python/vX.Y.Z`.
#
# Repository secrets:
#   PYPI_API_TOKEN — PyPI API token (password; use username __token__ below).

name: Publish Python (PyPI)

on:
  push:
    tags:
      - "python/v*"
  workflow_dispatch:

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Validate tag matches pyproject version
        run: |
          python - <<'PY'
          import os, re, sys
          try:
              import tomllib  # py3.11+
          except Exception:  # pragma: no cover
              import tomli as tomllib  # type: ignore
          tag = os.environ["GITHUB_REF_NAME"]
          m = re.match(r"^python/v(.+)$", tag)
          if not m:
              print(f"Unexpected tag format: {tag}", file=sys.stderr)
              sys.exit(1)
          expected = m.group(1)
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          actual = data["project"]["version"]
          if actual != expected:
              print(f"Tag {tag} expects version {expected}, but pyproject.toml has {actual}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {tag} matches pyproject.toml version {actual}")
          PY

      - name: Run tests
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt
          python -m pytest

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

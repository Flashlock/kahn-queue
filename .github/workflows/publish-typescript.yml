# Publish the TypeScript package to npm on tags: `typescript/vX.Y.Z`.
#
# Repository secrets (Settings → Secrets → Actions):
#   NPM_TOKEN — npm automation token with permission to publish this package.

name: Publish TypeScript (npm)

on:
  push:
    tags:
      - "typescript/v*"
  workflow_dispatch:

concurrency:
  group: publish-typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate tag matches package version
        run: |
          node -e "const tag='${GITHUB_REF_NAME}'; const expected=tag.replace(/^typescript\/v/,''); const pkg=require('./package.json'); if(pkg.version!==expected){ console.error(`Tag ${tag} expects version ${expected}, but package.json has ${pkg.version}`); process.exit(1);} console.log(`OK: ${tag} matches package.json version ${pkg.version}`);"

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

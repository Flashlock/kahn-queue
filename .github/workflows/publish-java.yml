# Publish the Java package on tags: `java/vX.Y.Z`.
#
# This workflow is intended for Maven Central publishing once Gradle signing + publishing
# are configured in `java/build.gradle.kts`.

name: Publish Java (Maven Central)

on:
  push:
    tags:
      - "java/v*"
  workflow_dispatch:

concurrency:
  group: publish-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate tag matches Gradle project version
        working-directory: java
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="${TAG#java/v}"
          chmod +x ./gradlew
          ACTUAL="$(./gradlew -q -Pversion="${EXPECTED}" properties | grep '^version:' | awk '{print $2}')"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "Tag ${TAG} expects version ${EXPECTED}, but Gradle version is ${ACTUAL}"
            exit 1
          fi
          echo "OK: ${TAG} matches Gradle version ${ACTUAL}"

      - name: Gradle build
        working-directory: java
        run: |
          chmod +x ./gradlew
          ./gradlew -Pversion="${GITHUB_REF_NAME#java/v}" assemble

      - name: Publish to Maven Central
        working-directory: java
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#java/v}"
          chmod +x ./gradlew
          ./gradlew -Pversion="${VERSION}" publishToSonatype closeAndReleaseStagingRepositories

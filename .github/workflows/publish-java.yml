# Placeholder until Maven Central (or another registry) is configured in java/build.gradle.kts
# with mavenPublishUrl + credentials. Then replace the final step with:
#   ./gradlew publish
# and add secrets for the repository.

name: Publish Java (Maven — placeholder)

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - ".github/workflows/publish-java.yml"
  workflow_dispatch:

concurrency:
  group: publish-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle build
        working-directory: java
        run: |
          chmod +x ./gradlew
          ./gradlew assemble

      - name: Maven publish (disabled)
        working-directory: java
        run: |
          echo "TODO: configure publishing in build.gradle.kts (mavenPublishUrl, credentials),"
          echo "      add repository secrets, then run: ./gradlew publish"
